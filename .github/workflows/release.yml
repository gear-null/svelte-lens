name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't cancel in-progress releases — partial publishes are bad.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Default to no permissions; grant explicitly per job.
permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # for npm OIDC trusted publishing + provenance
      contents: write    # for changesets to create GitHub releases
    # Only publish when the Version PR was merged (commit message matches)
    # or when manually triggered via workflow_dispatch.
    # Repository is locked to squash-only merges, and squash commit title is
    # set to the PR title, so this is deterministic.
    if: >
      startsWith(github.event.head_commit.message, 'chore: version packages')
      || github.event_name == 'workflow_dispatch'
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          # changesets/action needs full git history to generate accurate
          # changelogs and resolve commit references.
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # pin@v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm build

      - name: Publish to npm and create GitHub release
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # pin@v1.8.0
        with:
          publish: pnpm release
          createGitHubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Summarize release
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          {
            echo "## Released packages"
            echo '```json'
            printf '%s\n' "$PUBLISHED"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
