name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (semver, e.g. 1.0.1). Must match package.json."
        required: true

# Don't cancel in-progress releases — partial publishes are bad.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Default to no permissions; grant explicitly per job.
permissions: {}

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for npm OIDC trusted publishing + provenance
      contents: read # checkout only — GitHub Release already exists
    outputs:
      published_version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pin@v6.0.3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # pin@v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Tokenless OIDC trusted publishing requires npm CLI >= 11.5.1;
      # Node 22 bundles npm 10.x. The npm-side Trusted Publisher must be
      # configured for this repo+workflow at npmjs.com (package settings).
      - run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm build

      - name: Resolve target version
        id: resolve
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "$RELEASE_TAG" ]; then
            # Tag format: @gear-null/svelte-lens@1.2.3 → extract "1.2.3"
            VERSION="${RELEASE_TAG##*@}"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            echo "No version source (not a release event and no version input)"
            exit 1
          fi
          # Validate semver format.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Rejected version (not semver): $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package.json matches release version
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./packages/svelte-lens/package.json').version")
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "Version mismatch: package.json has $PACKAGE_VERSION, expected $VERSION"
            echo "Merge the Version PR first, then create the GitHub Release."
            exit 1
          fi
          echo "Version verified: $VERSION"

      - name: Publish to npm with provenance
        env:
          # Release events publish via OIDC trusted publishing; the
          # long-lived NPM_TOKEN is only injected for emergency manual
          # publishes (workflow_dispatch). The variable must still exist
          # (empty) so setup-node's .npmrc env substitution succeeds.
          NODE_AUTH_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.NPM_TOKEN || '' }}
        run: |
          set -euo pipefail
          cd packages/svelte-lens
          npm publish --provenance --no-git-checks
          echo "Published @gear-null/svelte-lens@$(node -p "require('./package.json').version")"

      - name: Summarize release
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          {
            echo "## Published @gear-null/svelte-lens@$VERSION"
            echo "Provenance: enabled (OIDC trusted publishing)"
          } >> "$GITHUB_STEP_SUMMARY"
