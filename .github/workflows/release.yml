name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't cancel in-progress releases — partial publishes are bad.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Only publish when the Version PR was merged (commit message matches)
    # or when manually triggered via workflow_dispatch.
    # Repository is locked to squash-only merges, and squash commit title is
    # set to the PR title, so this is deterministic.
    if: >
      startsWith(github.event.head_commit.message, 'chore: version packages')
      || github.event_name == 'workflow_dispatch'
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v6
        with:
          # changesets/action needs full git history to generate accurate
          # changelogs and resolve commit references.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish to npm and create GitHub release
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGitHubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Summarize release
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "## Released packages" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.changesets.outputs.publishedPackages }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
