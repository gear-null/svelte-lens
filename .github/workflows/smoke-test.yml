name: Post-Release Smoke Test

on:
  # Run after release.yml completes successfully — avoids a race where
  # the package isn't on npm yet when this workflow starts.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: ["@gear-null/svelte-lens@*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test (semver, e.g. 1.0.0). Defaults to latest."
        required: false
        default: ""

# Default to no permissions; grant explicitly per job.
permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  smoke-test:
    name: Smoke Test Published Package
    runs-on: ubuntu-latest
    # Only run when release.yml succeeded (not failed/cancelled).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version: 22

      # Pass tainted inputs through env vars (never inline ${{ }} into shell)
      # and validate the format before using.
      - name: Resolve target version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          elif [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG##*@}"
          else
            VERSION="latest"
          fi
          # Allowlist: semver (1.2.3, 1.2.3-beta.1) or literal "latest".
          if ! printf '%s' "$VERSION" | grep -Eq '^(latest|[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$'; then
            echo "Rejected version (not semver/latest): $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing @gear-null/svelte-lens@$VERSION"

      - name: Install from npm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          npm init -y
          # Retry up to 3 times — npm registry propagation can lag.
          for i in 1 2 3; do
            if npm install "@gear-null/svelte-lens@$VERSION" 2>/dev/null; then
              break
            fi
            echo "Attempt $i failed — npm registry may not have the version yet. Retrying in 30s..."
            sleep 30
          done

      - name: Verify installed version matches
        if: steps.version.outputs.version != 'latest'
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          INSTALLED=$(node -p "require('@gear-null/svelte-lens/package.json').version")
          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "Version mismatch: expected $EXPECTED, got $INSTALLED"
            exit 1
          fi
          echo "Verified version: $INSTALLED"

      - name: Verify package exports
        run: |
          node --input-type=module -e "
            import * as api from '@gear-null/svelte-lens';
            const required = ['init','copyPlugin','openPlugin','getSource','getStack','getStackContext','getElementContext','isLensHost','getGlobalApi','registerPlugin','unregisterPlugin'];
            for (const name of required) {
              if (!(name in api)) { console.error('MISSING:', name); process.exit(1); }
            }
            console.log('All', required.length, 'exports verified');
          "

      - name: Verify CLI bin
        run: |
          npx svelte-lens --version
          npx svelte-lens init --help

      - name: Verify MCP bin
        run: |
          set -euo pipefail
          npx svelte-lens-mcp --port 25174 &
          MCP_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:25174/health | grep -q '"ok"'
          kill $MCP_PID 2>/dev/null
          echo "MCP health check passed"

      - name: Scaffold SvelteKit and run init
        run: |
          set -euo pipefail
          cd /tmp
          npx sv create --template minimal --types ts --no-add-ons sk-test
          cd sk-test
          npx svelte-lens init --yes --skip-install
          grep -q "@gear-null/svelte-lens" src/routes/+layout.svelte
          echo "CLI init verified in fresh SvelteKit project"
