name: Version

on:
  push:
    branches: [main]
    # This workflow exists solely to process changesets, so trigger only
    # on .changeset/** changes (additions open/update the Version PR;
    # the consuming "chore: version packages" commit is filtered by the
    # job-level if). The previous paths-ignore list excluded "**.md",
    # which also matched .changeset/*.md and made the documented release
    # flow unrunnable.
    paths:
      - ".changeset/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to no permissions; grant explicitly per job.
permissions: {}

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    permissions:
      contents: write          # for the version-bump commit
      pull-requests: write     # for the Version PR
    # Don't run on the version-bump commit itself — publishing is a
    # separate step triggered by creating a GitHub Release.
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: version packages') }}"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pin@v6.0.3
        with:
          # changesets/action needs full git history to generate changelogs.
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # pin@v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create or Update Version PR
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # pin@v1.9.0
        with:
          version: pnpm version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
