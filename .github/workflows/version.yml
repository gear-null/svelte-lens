name: Version

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".prettierignore"
      - ".prettierrc"
      - ".editorconfig"
      - ".github/CODEOWNERS"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/dependabot.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/smoke-test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to no permissions; grant explicitly per job.
permissions: {}

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    permissions:
      contents: write          # for the version-bump commit
      pull-requests: write     # for the Version PR
    # Don't run on the version-bump commit itself — release.yml handles that.
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: version packages') }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          # changesets/action needs full git history to generate changelogs.
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # pin@v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create or Update Version PR
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # pin@v1.8.0
        with:
          version: pnpm version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
