name: Version

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".prettierignore"
      - ".prettierrc"
      - ".editorconfig"
      - ".github/CODEOWNERS"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/dependabot.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/smoke-test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    # Don't run on the version-bump commit itself — release.yml handles that.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore: version packages') }}
    steps:
      - uses: actions/checkout@v4
        with:
          # changesets/action needs full git history to generate changelogs.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create or Update Version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
